<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocs Sain | Sound Box</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --accent: #00d2ff; /* Cyber Blue */
            --text: #e0e0e0;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #bocs-container {
            width: 100%;
            max-width: 600px;
            border: 4px solid var(--border);
            background: var(--panel);
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
        }

        details {
            margin-bottom: 15px;
            border: 1px solid var(--border);
            background: #252525;
            transition: all 0.3s ease;
        }

        details[open] {
            border-color: var(--accent);
        }

        summary {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        summary::after {
            content: '▼';
            font-size: 0.8rem;
            color: var(--accent);
        }

        details[open] summary::after {
            content: '▲';
        }

        ul {
            list-style: none;
            padding: 0 0 15px 0;
            margin: 0;
        }

        li {
            border-top: 1px solid var(--border);
        }

        li a {
            display: block;
            padding: 12px 20px;
            color: var(--text);
            text-decoration: none;
            transition: background 0.2s;
        }

        li a:hover {
            background: rgba(0, 210, 255, 0.1);
            color: var(--accent);
        }

        .wip {
            font-style: italic;
            color: #666;
            padding: 12px 20px;
        }
    </style>
</head>
<body>

<div id="bocs-container">
    <h1>BOCS SAIN</h1>

    <details>
        <summary>GAMES</summary>
        <ul>
            <li><a href="3d-trainer.html">3D Audio Radar Trainer</a></li>
            <li><a href="puzzle-block.html">Puzzle Block</a></li>
            <li class="wip">More coming soon...</li>
        </ul>
    </details>

    <details>
        <summary>TOOLS</summary>
        <ul>
            <li><a href="8-track-mixer.html">8-Track Mixer</a></li>
            <li><a href="chopper.html">Sample Chopper / Recorder</a></li>
        </ul>
    </details>

    <details>
        <summary>INSTRUMENTS</summary>
        <ul>
            <li><a href="fm-screamer.html">FM Screamer Synth</a></li>
            <li><a href="sequencer.html">Drum Pad & Sequencer</a></li>
        </ul>
    </details>

    <details>
        <summary>EDUCATION</summary>
        <ul>
            <li><a href="theory.html">Audio Theory Basics</a></li>
            <li><a href="manual.html">Bocs Sain User Guide</a></li>
        </ul>
    </details>
</div>

</body>
</html>

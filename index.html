<!DOCTYPE html>
<html>
<head>
    <title>SWISS ARMY STUDIO v1.0</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0d0d0d; --panel: #1a1a1a; --active: #ff0055; }
        
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* Navigation Bar */
        nav { display: flex; background: #000; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 100; }
        nav button { flex: 1; padding: 15px; background: none; border: none; color: #666; font-weight: bold; cursor: pointer; transition: 0.3s; }
        nav button.active { color: var(--neon); border-bottom: 3px solid var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* Screens */
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Modules & Sliders */
        .module { background: var(--panel); border: 1px solid #333; box-shadow: 5px 5px 0px #000; padding: 20px; margin: 10px auto; max-width: 500px; border-radius: 4px; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: #222; height: 10px; margin: 15px 0; border: 1px solid #444; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 25px; width: 15px; background: var(--neon); box-shadow: 0 0 8px var(--neon); cursor: pointer; }

        .btn-main { padding: 15px 30px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-main:active { background: var(--active); }
        
        h2 { text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

    <nav>
        <button onclick="showScreen('mixer')" id="nav-mixer">MIXER (3D)</button>
        <button onclick="showScreen('synth')" id="nav-synth" class="active">FM SYNTH</button>
        <button onclick="showScreen('pads')" id="nav-pads">DRUM PADS</button>
    </nav>

    <div id="mixer" class="screen">
        <h2>3D Radar Mixer</h2>
        <div class="module">
            <p>[3D Visualizer Placeholder - Coming Soon]</p>
            <div style="width: 200px; height: 200px; border: 2px dashed #444; margin: auto; border-radius: 50%;"></div>
        </div>
    </div>

    <div id="synth" class="screen active">
        <h2>FM Lab Unit</h2>
        <button id="power" class="btn-main">INITIALIZE AUDIO</button>
        
        <div class="module">
            <label>CARRIER FREQ</label>
            <input type="range" id="carFreq" min="20" max="1000" value="220">
            <label>FM MODULATION</label>
            <input type="range" id="modFreq" min="1" max="1000" value="50">
            <label>GRIT DEPTH</label>
            <input type="range" id="modDepth" min="0" max="2000" value="100">
        </div>
        
        <div class="module">
            <label>WARMTH (FILTER)</label>
            <input type="range" id="filterFreq" min="50" max="15000" value="2000">
        </div>
    </div>

    <div id="pads" class="screen">
        <h2>Drum Sequencer</h2>
        <div class="module" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
            <button class="btn-main" style="height: 60px;">PAD 1</button>
            <button class="btn-main" style="height: 60px;">PAD 2</button>
            <button class="btn-main" style="height: 60px;">PAD 3</button>
            <button class="btn-main" style="height: 60px;">PAD 4</button>
        </div>
        <p>Select a pad to edit sequence...</p>
    </div>

<script>
    // NAVIGATION LOGIC
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById(screenId).classList.add('active');
        document.getElementById('nav-' + screenId).classList.add('active');
    }

    // AUDIO LOGIC (Keep the FM code here)
    let audioCtx, carrier, modulator, modGain, filter, master;

    document.getElementById('power').onclick = async () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        if (carrier) return;

        modulator = audioCtx.createOscillator();
        modGain = audioCtx.createGain();
        carrier = audioCtx.createOscillator();
        filter = audioCtx.createBiquadFilter();
        master = audioCtx.createGain();

        modulator.connect(modGain);
        modGain.connect(carrier.frequency);
        carrier.connect(filter);
        filter.connect(master);
        master.connect(audioCtx.destination);

        // Map UI
        const update = (node, param, val) => node[param].setTargetAtTime(parseFloat(val), audioCtx.currentTime, 0.05);
        
        document.getElementById('carFreq').oninput = (e) => update(carrier, 'frequency', e.target.value);
        document.getElementById('modFreq').oninput = (e) => update(modulator, 'frequency', e.target.value);
        document.getElementById('modDepth').oninput = (e) => update(modGain, 'gain', e.target.value);
        document.getElementById('filterFreq').oninput = (e) => update(filter, 'frequency', e.target.value);

        filter.type = "lowpass";
        master.gain.value = 0.3;
        modulator.start();
        carrier.start();
        
        document.getElementById('power').innerText = "SYSTEM ONLINE";
        document.getElementById('power').style.background = "var(--active)";
    };
</script>
</body>
</html>

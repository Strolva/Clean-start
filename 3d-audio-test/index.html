<!DOCTYPE html>
<html>
<head>
    <title>3D Spatial Trainer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #0f172a; color: #38bdf8; font-family: sans-serif; text-align: center; margin: 0; touch-action: none; }
        #container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
        
        /* The Radar (X and Z axis) */
        #radar { 
            width: 280px; height: 280px; border: 2px solid #38bdf8; 
            border-radius: 50%; position: relative;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 70%);
        }
        #listener { 
            width: 20px; height: 20px; background: white; border-radius: 50%;
            position: absolute; top: 130px; left: 130px; box-shadow: 0 0 15px white;
        }
        #sound-source {
            width: 50px; height: 50px; background: #ef4444; border-radius: 50%;
            position: absolute; cursor: grab; box-shadow: 0 0 15px #ef4444;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;
        }
  <button id="resetBtn" style="background: #64748b; margin-left: 10px;">RESET TO CENTER</button>
        /* The Height Control (Y axis) */
        .slider-wrap { width: 280px; display: flex; flex-direction: column; gap: 10px; }
        input[type=range] { width: 100%; cursor: pointer; }
        
        button { padding: 15px 30px; font-size: 1.2rem; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
      
    </style>
</head>
<body>

<div id="container">
    <h2>3D POSITIONAL TRAINER</h2>
    
    <button id="startBtn">INITIALIZE 3D ENGINE</button>

    <div id="radar">
        <div id="listener"></div>
        <div id="sound-source">DRAG</div>
    </div>

    <div class="slider-wrap">
        <label>HEIGHT (Above / Below)</label>
        <input type="range" id="yAxis" min="-10" max="10" step="0.1" value="0">
        <div style="display:flex; justify-content: space-between; font-size: 0.8rem;">
            <span>BELOW</span><span>EYE LEVEL</span><span>ABOVE</span>
        </div>
    </div>
</div>

<script>

    const resetBtn = document.getElementById('resetBtn');

resetBtn.onclick = () => {
    // 1. Reset the Coordinates
    posX = 115; 
    posY = 115; 
    
    // 2. Update the Visuals
    sourceDiv.style.left = posX + 'px';
    sourceDiv.style.top = posY + 'px';
    yAxis.value = 0;

    // 3. Update the Audio Engine
    if (panner) {
        panner.positionX.value = 0;
        panner.positionY.value = 0;
        panner.positionZ.value = 0;
    }
    console.log("Audio Reset to Center");
};
    
    let audioCtx, panner, source;
    const radar = document.getElementById('radar');
    const sourceDiv = document.getElementById('sound-source');
    const yAxis = document.getElementById('yAxis');
    const startBtn = document.getElementById('startBtn');

    let posX = 115, posY = 40; // Initial visual position
    sourceDiv.style.left = posX + 'px';
    sourceDiv.style.top = posY + 'px';

    async function init() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        panner = new PannerNode(audioCtx, { panningModel: 'HRTF', distanceModel: 'inverse' });

        const resp = await fetch('./mysound.mp3');
        const buffer = await audioCtx.decodeAudioData(await resp.arrayBuffer());
        source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.loop = true;

        source.connect(panner).connect(audioCtx.destination);
        source.start();
        startBtn.style.display = 'none';
        updateSpatialAudio();
    }

    function updateSpatialAudio() {
        if (!panner) return;
        // X = Left/Right, Z = Front/Back, Y = Up/Down
        const x3D = (posX - 115) / 20; 
        const z3D = (posY - 115) / 20; 
        const y3D = parseFloat(yAxis.value);

        panner.positionX.value = x3D;
        panner.positionY.value = y3D;
        panner.positionZ.value = z3D;
    }

    // UNIFIED DRAG LOGIC (Works for Mouse AND Touch)
    function handleMove(e) {
        e.preventDefault();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const rect = radar.getBoundingClientRect();
        posX = clientX - rect.left - 25;
        posY = clientY - rect.top - 25;

        // Keep it inside the radar circle
        sourceDiv.style.left = posX + 'px';
        sourceDiv.style.top = posY + 'px';
        updateSpatialAudio();
    }

    // Listeners for Mouse
    sourceDiv.onmousedown = () => { window.onmousemove = handleMove; };
    window.onmouseup = () => { window.onmousemove = null; };

    // Listeners for Touch
    sourceDiv.ontouchstart = () => { sourceDiv.ontouchmove = handleMove; };
    sourceDiv.ontouchend = () => { sourceDiv.ontouchmove = null; };

    yAxis.oninput = updateSpatialAudio;
    startBtn.onclick = init;
</script>

</body>
</html>

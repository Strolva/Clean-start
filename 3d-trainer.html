<!DOCTYPE html>
<html>
<head>
    <title>Bocs Sain | 3D Orbit Radar</title>
    <style>
        body { background: #121212; color: #00d2ff; font-family: monospace; text-align: center; margin: 0; overflow-x: hidden; }
        #master-controls { display: flex; justify-content: space-around; padding: 10px; background: #1a1a1a; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 100; }
        #master-controls button { flex: 1; margin: 5px; padding: 12px; border-radius: 5px; font-family: 'Courier New', monospace; font-weight: bold; cursor: pointer; }
        #stop-btn { background: #ff4b2b; border: none; color: white; }
        #exit-btn { background: #444; color: white; border: 1px solid #666; }
        
        #radar-container { margin-top: 20px; position: relative; display: inline-block; }
        canvas { background: radial-gradient(circle, #1a1a1a 0%, #000 70%); border: 5px solid #333; border-radius: 50%; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); cursor: crosshair; }

        .slider-box { margin: 15px auto; width: 300px; color: #00d2ff; font-weight: bold; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        input[type="range"] { width: 100%; height: 20px; cursor: pointer; accent-color: #00d2ff; }

        .hud { margin-top: 10px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .control-btns button { background: #00d2ff; border: none; padding: 15px 25px; font-weight: bold; cursor: pointer; margin: 5px; color: #000; border-radius: 4px; }
        .reset-btn { background: #444 !important; color: white !important; }
        .auto-btn { transition: 0.3s; }
    </style>
</head>
<body>

    <div id="master-controls">
        <button id="stop-btn" onclick="killAudio()">SILENCE ALL</button>
        <button id="exit-btn" onclick="goHome()">BACK TO HUB</button>
    </div>

    <div class="hud" id="status-display">Signal: Standby</div>

    <div style="display: flex; justify-content: center; flex-wrap: wrap;">
        <div class="slider-box">
            <label>MANUAL DEPTH (TONE)</label><br>
            <input type="range" id="depth-slider" min="0" max="1" step="0.01" value="0.7">
        </div>
        <div class="slider-box">
            <label>ORBIT SPEED</label><br>
            <input type="range" id="pan-speed" min="0" max="5" step="0.1" value="1">
            <button id="auto-btn" class="auto-btn" onclick="toggleAutopan()" style="margin-top:10px; width: 100%; padding: 8px;">AUTOPAN: OFF</button>
        </div>
    </div>
    
    <div id="radar-container">
        <canvas id="radar" width="400" height="400"></canvas>
    </div>

    <div class="hud control-btns">
        <button onclick="startOscillator()">START BEEP</button>
        <button style="background: #00ff88;" onclick="document.getElementById('audio-file').click()">LOAD SAMPLE</button>
        <button class="reset-btn" onclick="resetCenter()">CENTER</button>
        <input type="file" id="audio-file" accept="audio/*" style="display:none">
    </div>

    <button id="dir-btn" onclick="toggleDirection()" style="margin-top:5px; width: 100%; padding: 8px; background: #333; color: #00d2ff; border: 1px solid #555;">DIRECTION: CW</button>

<script>
    const canvas = document.getElementById('radar');
    const ctx = canvas.getContext('2d');
    
    let audioCtx, oscillator, panner, gainNode, filter, sampleSource;
    let targetX = 200, targetY = 200;
    let autopanActive = false;
    let panAngle = 0;
    let orbitDirection = 1; // 1 for Clockwise, -1 for Anticlockwise
    
    function draw() {
        // AUTOPAN LOGIC (The "Heartbeat")
        if (autopanActive) {
            const speed = document.getElementById('pan-speed').value;
            // Add orbitDirection here to flip the spin
        panAngle += (parseFloat(speed) * 0.015) * orbitDirection; // Adjust for orbit smoothness
            
            // Orbit in a circle around the center (200, 200)
            targetX = 200 + (Math.sin(panAngle) * 160);
            targetY = 200 + (Math.cos(panAngle) * 160);
            
            updateAudioPosition();
        }

        // VISUALS
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.fillRect(0, 0, 400, 400);
        
        // Radar Rings
        ctx.strokeStyle = "#004455";
        ctx.lineWidth = 1;
        for(let i=1; i<=3; i++) { ctx.beginPath(); ctx.arc(200, 200, i * 50, 0, Math.PI * 2); ctx.stroke(); }
        
        // Crosshairs
        ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(200, 400); ctx.moveTo(0, 200); ctx.lineTo(400, 200); ctx.stroke();
        
        // The Blip (Glowing)
        ctx.fillStyle = "#00d2ff";
        ctx.shadowBlur = 15; ctx.shadowColor = "#00d2ff";
        ctx.beginPath(); ctx.arc(targetX, targetY, 12, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;

        requestAnimationFrame(draw);
    }

    function updateAudioPosition() {
    if (!audioCtx || !filter || !panner || !gainNode) return;

    // 1. PANNING
    const panValue = (targetX / 200) - 1;
    panner.pan.setTargetAtTime(panValue, audioCtx.currentTime, 0.05);

    // 2. THE SMOOTH 360 GRADIENT (No more "clicks" or "shifts")
    // We map the Y position (0-400) to a multiplier (1.0 to 0.4)
    // 0 is front (bright), 400 is back (muffled)
    const yPercent = targetY / 400; 
    const muffleMultiplier = 1.0 - (yPercent * 0.6); // Slopes down to 0.4
    const volumeMultiplier = 1.0 - (yPercent * 0.5); // Slopes down to 0.5
    
    const depthSlider = document.getElementById('depth-slider').value;
    let baseFreq = 200 * Math.pow(10000 / 200, depthSlider);
    
    // Apply smooth changes
    filter.frequency.setTargetAtTime(baseFreq * muffleMultiplier, audioCtx.currentTime, 0.1);
    gainNode.gain.setTargetAtTime(0.15 * volumeMultiplier, audioCtx.currentTime, 0.1);

    // 3. OSCILLATOR PITCH
    if (oscillator) {
        const pitch = 600 - targetY;
        oscillator.frequency.setTargetAtTime(pitch, audioCtx.currentTime, 0.05);
    }
}
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";
            panner = audioCtx.createStereoPanner();
            gainNode = audioCtx.createGain();
            
            filter.connect(panner);
            panner.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        }
        audioCtx.resume();
    }

    function startOscillator() {
        initAudio();
        if (oscillator) oscillator.stop();
        if (sampleSource) { sampleSource.stop(); sampleSource = null; }
        
        oscillator = audioCtx.createOscillator();
        oscillator.type = 'triangle'; // Softer on the brain
        oscillator.connect(filter);
        oscillator.start();
        document.getElementById('status-display').innerText = "Signal: OSCILLATOR (TRI)";
        updateAudioPosition();
    }

    document.getElementById('audio-file').onchange = function(e) {
        initAudio();
        const reader = new FileReader();
        reader.onload = function(event) {
            audioCtx.decodeAudioData(event.target.result, (buffer) => {
                if (oscillator) { oscillator.stop(); oscillator = null; }
                if (sampleSource) sampleSource.stop();
                
                sampleSource = audioCtx.createBufferSource();
                sampleSource.buffer = buffer;
                sampleSource.loop = true;
                sampleSource.connect(filter);
                sampleSource.start();
                
                document.getElementById('status-display').innerText = "Signal: SAMPLE ACTIVE";
                updateAudioPosition();
            });
        };
        reader.readAsArrayBuffer(this.files[0]);
    };

    function toggleAutopan() {
        autopanActive = !autopanActive;
        const btn = document.getElementById('auto-btn');
        btn.innerText = autopanActive ? "AUTOPAN: ON" : "AUTOPAN: OFF";
        btn.style.background = autopanActive ? "#00ff88" : "#444";
        btn.style.color = autopanActive ? "#000" : "#00d2ff";
    }

    function resetCenter() { autopanActive = false; targetX = 200; targetY = 200; updateAudioPosition(); }
    
    function killAudio() { 
        if (audioCtx) audioCtx.suspend(); 
        document.getElementById('status-display').innerText = "Signal: SILENCED";
    }

    function goHome() { 
        if (audioCtx) { audioCtx.close().then(() => { window.location.href = "index.html"; }); } 
        else { window.location.href = "index.html"; } 
    }

    // SLIDER LISTENER
    document.getElementById('depth-slider').addEventListener('input', updateAudioPosition);

    // MOUSE & TOUCH
    canvas.addEventListener('mousedown', (e) => {
        if (autopanActive) return;
        const rect = canvas.getBoundingClientRect();
        targetX = e.clientX - rect.left; targetY = e.clientY - rect.top;
        updateAudioPosition();
    });

    canvas.addEventListener('touchstart', (e) => {
        if (autopanActive) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        targetX = touch.clientX - rect.left; targetY = touch.clientY - rect.top;
        updateAudioPosition();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (autopanActive) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        targetX = touch.clientX - rect.left; targetY = touch.clientY - rect.top;
        updateAudioPosition();
    }, { passive: false });

    draw();

    function toggleDirection() {
    orbitDirection *= -1;
    const btn = document.getElementById('dir-btn');
    btn.innerText = orbitDirection === 1 ? "DIRECTION: CW" : "DIRECTION: ACW";
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Bocs Sain | Radar Trainer</title>
    <style>
        body { background: #121212; color: #00d2ff; font-family: monospace; text-align: center; margin: 0; overflow-x: hidden; }
        
        #master-controls {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: #1a1a1a;
            border-bottom: 2px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        #master-controls button {
            flex: 1;
            margin: 5px;
            padding: 12px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
        }

        #stop-btn { background: #ff4b2b; border: none; color: white; }
        #exit-btn { background: #444; color: white; border: 1px solid #666; }

        #radar-container { margin-top: 30px; position: relative; display: inline-block; }

        canvas { 
            background: radial-gradient(circle, #1a1a1a 0%, #000 70%);
            border: 5px solid #333; 
            border-radius: 50%; 
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            cursor: crosshair;
        }

        .hud { margin-top: 20px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .control-btns button { background: #00d2ff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; margin: 5px; color: #000; }
        .reset-btn { background: #444 !important; color: white !important; }
    </style>
</head>
<body>

    <div id="master-controls">
        <button id="stop-btn" onclick="killAudio()">STOP AUDIO</button>
        <button id="exit-btn" onclick="goHome()">BACK TO HUB</button>
    </div>

    <div class="hud" id="status-display">Sector: 01 | Signal: Active</div>
    
    <div id="radar-container">
        <canvas id="radar" width="400" height="400"></canvas>
    </div>

    <div class="hud control-btns">
        <button onclick="startAudio()">ENGAGE SIGNAL</button>
        <button class="reset-btn" onclick="resetCenter()">CENTER BLIP</button>
        <p style="font-size: 0.8rem; color: #555;">Tap radar to move blip. Y-axis controls Pitch.</p>
    </div>

<script>
    const canvas = document.getElementById('radar');
    const ctx = canvas.getContext('2d');
    
    // AUDIO ENGINE VARIABLES
    let audioCtx;
    let oscillator;
    let panner;
    let gainNode; // To prevent clicking sounds
    
    let targetX = 200, targetY = 200;

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.fillRect(0, 0, 400, 400);

        // Draw Radar Rings
        ctx.strokeStyle = "#004455";
        ctx.lineWidth = 1;
        for(let i=1; i<=3; i++) {
            ctx.beginPath();
            ctx.arc(200, 200, i * 50, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Draw Crosshair
        ctx.beginPath();
        ctx.moveTo(200, 0); ctx.lineTo(200, 400);
        ctx.moveTo(0, 200); ctx.lineTo(400, 200);
        ctx.stroke();

        // Draw the Blip
        ctx.fillStyle = "#00d2ff";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#00d2ff";
        ctx.beginPath();
        ctx.arc(targetX, targetY, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        requestAnimationFrame(draw);
    }

    // THIS UPDATES THE SOUND BASED ON BLIP POSITION
    function updateAudioPosition() {
        if (!audioCtx || !oscillator) return;

        // 1. PANNING: Left (-1) to Right (1)
        const panValue = (targetX / 200) - 1;
        panner.pan.setTargetAtTime(panValue, audioCtx.currentTime, 0.05);

        // 2. PITCH: Vertical position (0 is top, 400 is bottom)
        // We invert it so higher up = higher pitch
        const freq = 600 - targetY; 
        oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
    }

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        targetX = e.clientX - rect.left;
        targetY = e.clientY - rect.top;
        updateAudioPosition();
    });

    function resetCenter() {
        targetX = 200;
        targetY = 200;
        updateAudioPosition();
    }

    function startAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // OSCILLATOR -> PANNER -> MASTER GAIN -> SPEAKERS
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            
            panner = audioCtx.createStereoPanner();
            
            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Keep it quiet-ish

            oscillator.connect(panner);
            panner.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
        }
        audioCtx.resume();
        document.getElementById('status-display').innerText = "Sector: 01 | Signal: ONLINE";
        updateAudioPosition();
    }

    function killAudio() {
        if (audioCtx) {
            audioCtx.suspend().then(() => {
                document.getElementById('status-display').innerText = "Sector: 01 | Signal: SILENCED";
            });
        }
    }

    function goHome() {
        if (audioCtx) {
            audioCtx.close().then(() => { window.location.href = "index.html"; });
        } else {
            window.location.href = "index.html";
        }
    }

    draw();
    // TOUCH SCREEN SUPPORT
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault(); // Prevents the screen from scrolling while you move the dot
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0]; // Get the first finger that touched
    targetX = touch.clientX - rect.left;
    targetY = touch.clientY - rect.top;
    updateAudioPosition();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault(); 
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    targetX = touch.clientX - rect.left;
    targetY = touch.clientY - rect.top;
    updateAudioPosition();
}, { passive: false });
</script>
</body>
</html>

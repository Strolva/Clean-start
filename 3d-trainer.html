<!DOCTYPE html>
<html>
<head>
    <title>Bocs Sain | Radar Trainer</title>
    <style>
        body { background: #121212; color: #00d2ff; font-family: monospace; text-align: center; margin: 0; overflow-x: hidden; }
        #master-controls { display: flex; justify-content: space-around; padding: 10px; background: #1a1a1a; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 100; }
        #master-controls button { flex: 1; margin: 5px; padding: 12px; border-radius: 5px; font-family: 'Courier New', monospace; font-weight: bold; cursor: pointer; }
        #stop-btn { background: #ff4b2b; border: none; color: white; }
        #exit-btn { background: #444; color: white; border: 1px solid #666; }
        
        #radar-container { margin-top: 20px; position: relative; display: inline-block; }
        canvas { background: radial-gradient(circle, #1a1a1a 0%, #000 70%); border: 5px solid #333; border-radius: 50%; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); cursor: crosshair; }

        .slider-box { margin: 20px auto; width: 300px; color: #00d2ff; font-weight: bold; }
        #depth-slider { width: 100%; height: 25px; cursor: pointer; accent-color: #00d2ff; }

        .hud { margin-top: 10px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .control-btns button { background: #00d2ff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; margin: 5px; color: #000; }
        .reset-btn { background: #444 !important; color: white !important; }
        .load-btn { background: #00ff88 !important; }
    </style>
</head>
<body>

    <div id="master-controls">
        <button id="stop-btn" onclick="killAudio()">STOP ALL</button>
        <button id="exit-btn" onclick="goHome()">BACK TO HUB</button>
    </div>

    <div class="hud" id="status-display">Sector: 01 | Signal: Ready</div>

    <div class="slider-box">
        <label>HEIGHT / DEPTH (TONE)</label><br>
        <input type="range" id="depth-slider" min="0" max="1" step="0.01" value="0.5">
    </div>
    
    <div id="radar-container">
        <canvas id="radar" width="400" height="400"></canvas>
    </div>

    <div class="hud control-btns">
        <button onclick="startOscillator()">TEST BEEP</button>
        <button class="load-btn" onclick="document.getElementById('audio-file').click()">LOAD SAMPLE</button>
        <button class="reset-btn" onclick="resetCenter()">CENTER</button>
        <input type="file" id="audio-file" accept="audio/*" style="display:none">
    </div>

    <div class="slider-box">
    <label>AUTOPAN SPEED</label><br>
    <input type="range" id="pan-speed" min="0" max="5" step="0.1" value="1">
    <br><br>
    <button id="auto-btn" onclick="toggleAutopan()" style="background: #444; color: #00d2ff; border: 1px solid #00d2ff;">AUTOPAN: OFF</button>
</div>

<script>
    const canvas = document.getElementById('radar');
    const ctx = canvas.getContext('2d');
    
    // THE PLUMBING FIX: Global variables so everyone can talk to each other
    let audioCtx, oscillator, panner, gainNode, filter, sampleSource;
    let targetX = 200, targetY = 200;

    // VISUALS
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.fillRect(0, 0, 400, 400);
        ctx.strokeStyle = "#004455";
        for(let i=1; i<=3; i++) { ctx.beginPath(); ctx.arc(200, 200, i * 50, 0, Math.PI * 2); ctx.stroke(); }
        ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(200, 400); ctx.moveTo(0, 200); ctx.lineTo(400, 200); ctx.stroke();
        ctx.fillStyle = "#00d2ff";
        ctx.beginPath(); ctx.arc(targetX, targetY, 10, 0, Math.PI * 2); ctx.fill();
        requestAnimationFrame(draw);
    }

    // THE LOGARITHMIC TRANSLATOR
    function updateAudioPosition() {
        if (!audioCtx || !filter) return;

        // 1. PAN (X)
        const panValue = (targetX / 200) - 1;
        panner.pan.setTargetAtTime(panValue, audioCtx.currentTime, 0.05);

        // 2. PITCH (Y) - Only affects the beep, not your samples
        if (oscillator) {
            const freq = 600 - targetY; 
            oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
        }

        // 3. DEPTH SLIDER (Logarithmic Fix)
        const sliderVal = document.getElementById('depth-slider').value;
        // This math spreads the "usable" sound across the whole slider
        const frequency = 200 * Math.pow(10000 / 200, sliderVal); 
        filter.frequency.setTargetAtTime(frequency, audioCtx.currentTime, 0.05);
    }

    // INITIALIZE THE PIPES
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";
            panner = audioCtx.createStereoPanner();
            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);

            // THE MAIN CHAIN: (Source) -> Filter -> Panner -> Gain -> Out
            filter.connect(panner);
            panner.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        }
        audioCtx.resume();
    }

    // BUTTON 1: THE BEEP
    function startOscillator() {
        initAudio();
        if (oscillator) oscillator.stop();
        if (sampleSource) { sampleSource.stop(); sampleSource = null; }
        
        oscillator = audioCtx.createOscillator();
        oscillator.type = 'sine';
        oscillator.connect(filter); // Connect to the start of the chain
        oscillator.start();
        document.getElementById('status-display').innerText = "Signal: OSCILLATOR";
        updateAudioPosition();
    }

    // BUTTON 2: THE FILE LOADER
    document.getElementById('audio-file').onchange = function(e) {
        initAudio();
        const reader = new FileReader();
        reader.onload = function(event) {
            audioCtx.decodeAudioData(event.target.result, (buffer) => {
                if (oscillator) { oscillator.stop(); oscillator = null; }
                if (sampleSource) sampleSource.stop();
                
                sampleSource = audioCtx.createBufferSource();
                sampleSource.buffer = buffer;
                sampleSource.loop = true;
                sampleSource.connect(filter); // Connect to the same chain
                sampleSource.start();
                
                document.getElementById('status-display').innerText = "Signal: SAMPLE LOADED";
                updateAudioPosition();
            });
        };
        reader.readAsArrayBuffer(this.files[0]);
    };

    // CONTROLS
    document.getElementById('depth-slider').addEventListener('input', updateAudioPosition);

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        targetX = e.clientX - rect.left; targetY = e.clientY - rect.top;
        updateAudioPosition();
    });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        targetX = touch.clientX - rect.left; targetY = touch.clientY - rect.top;
        updateAudioPosition();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        targetX = touch.clientX - rect.left; targetY = touch.clientY - rect.top;
        updateAudioPosition();
    }, { passive: false });

    function resetCenter() { targetX = 200; targetY = 200; updateAudioPosition(); }
    
    function killAudio() { 
        if (audioCtx) audioCtx.suspend(); 
        document.getElementById('status-display').innerText = "Signal: SILENCED";
    }

    function goHome() { 
        if (audioCtx) { audioCtx.close().then(() => { window.location.href = "index.html"; }); } 
        else { window.location.href = "index.html"; } 
    }

    let autopanActive = false;
let panAngle = 0; // This tracks the "orbit" position

// 1. Change the oscillator type in startOscillator()
function startOscillator() {
    initAudio();
    // ... existing stop code ...
    oscillator = audioCtx.createOscillator();
    oscillator.type = 'triangle'; // MUCH softer on the ears than 'sine'
    oscillator.connect(filter);
    oscillator.start();
}

// 2. The Autopan Logic (Inside the draw loop or its own function)
function updateAutopan() {
    if (!autopanActive) return;

    const speed = document.getElementById('pan-speed').value;
    panAngle += (parseFloat(speed) * 0.02);
    
    // 1. CIRCULAR COORDINATES
    // This moves the dot in a circle on the radar screen
    targetX = 200 + (Math.sin(panAngle) * 150);
    targetY = 200 + (Math.cos(panAngle) * 150);
    
    // 2. APPLY THE "360 CHEAT"
    if (audioCtx && filter && gainNode) {
        // Is the dot in the "back" half of the radar? (Bottom half)
        const isBehind = targetY > 200;
        
        if (isBehind) {
            // Muffle it and quiet it down to simulate "Behind"
            filter.frequency.setTargetAtTime(800, audioCtx.currentTime, 0.1);
            gainNode.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.1);
        } else {
            // Bring it to the front (Clear and Louder)
            filter.frequency.setTargetAtTime(3000, audioCtx.currentTime, 0.1);
            gainNode.gain.setTargetAtTime(0.15, audioCtx.currentTime, 0.1);
        }
    }
    
    updateAudioPosition();
}

// 3. Update the draw() function to include the autopan call
function draw() {
    // 1. If Autopan is ON, change the coordinates before drawing
    if (autopanActive) {
        const speed = document.getElementById('pan-speed').value;
        panAngle += (parseFloat(speed) * 0.02);
        
        targetX = 200 + (Math.sin(panAngle) * 150);
        targetY = 200 + (Math.cos(panAngle) * 150);
        
        // Tell the ears that the eyes moved the dot
        updateAudioPosition(); 
    }

    // 2. Clear the screen (The "Ghosting" effect)
    ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
    ctx.fillRect(0, 0, 400, 400);

    // 3. Redraw the radar rings and the dot
    // ... (Your existing ring and arc code) ...

    requestAnimationFrame(draw);
}

function toggleAutopan() {
    autopanActive = !autopanActive;
    const btn = document.getElementById('auto-btn');
    btn.innerText = autopanActive ? "AUTOPAN: ON" : "AUTOPAN: OFF";
    btn.style.background = autopanActive ? "#00d2ff" : "#444";
    btn.style.color = autopanActive ? "#000" : "#00d2ff";
}

    draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Bocs Sain | Radar Trainer</title>
    <style>
        body { background: #121212; color: #00d2ff; font-family: monospace; text-align: center; margin: 0; overflow-x: hidden; }
        #master-controls { display: flex; justify-content: space-around; padding: 10px; background: #1a1a1a; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 100; }
        #master-controls button { flex: 1; margin: 5px; padding: 12px; border-radius: 5px; font-family: 'Courier New', monospace; font-weight: bold; cursor: pointer; }
        #stop-btn { background: #ff4b2b; border: none; color: white; }
        #exit-btn { background: #444; color: white; border: 1px solid #666; }
        #radar-container { margin-top: 30px; position: relative; display: inline-block; }
        canvas { background: radial-gradient(circle, #1a1a1a 0%, #000 70%); border: 5px solid #333; border-radius: 50%; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); cursor: crosshair; }
        .hud { margin-top: 20px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .control-btns button { background: #00d2ff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; margin: 5px; color: #000; }
        .reset-btn { background: #444 !important; color: white !important; }
        .slider-box {
    margin: 20px auto;
    width: 200px;
    color: #00d2ff;
}

#depth-slider {
    width: 100%;
    cursor: pointer;
    accent-color: #00d2ff; /* Makes the slider blue */
}
    </style>
</head>
<body>

    <div id="master-controls">
        <button id="stop-btn" onclick="killAudio()">STOP AUDIO</button>
        <button id="exit-btn" onclick="goHome()">BACK TO HUB</button>
    </div>

    <div class="hud" id="status-display">Sector: 01 | Signal: Active</div>
    
    <div id="radar-container">
        <canvas id="radar" width="400" height="400"></canvas>
    </div>

    <div class="hud control-btns">
        <button onclick="startAudio()">ENGAGE SIGNAL</button>
        <button class="reset-btn" onclick="resetCenter()">CENTER BLIP</button>
        <p style="font-size: 0.8rem; color: #555;">Y-axis: Up is Bright/High, Down is Muffled/Deep.</p>
    </div>

<div class="slider-box">
    <label>HEIGHT / DEPTH</label><br>
    <input type="range" id="depth-slider" min="200" max="5000" value="2000" step="1">
</div>
    

<script>
    const canvas = document.getElementById('radar');
    const ctx = canvas.getContext('2d');
    
    // 1. GLOBAL VARIABLES (The "State" of the app)
    let audioCtx, oscillator, panner, gainNode, filter; // Added 'filter' here
    let targetX = 200, targetY = 200;

    // 2. THE VISUAL LOOP (Runs 60fps)
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.fillRect(0, 0, 400, 400);
        ctx.strokeStyle = "#004455";
        for(let i=1; i<=3; i++) { ctx.beginPath(); ctx.arc(200, 200, i * 50, 0, Math.PI * 2); ctx.stroke(); }
        ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(200, 400); ctx.moveTo(0, 200); ctx.lineTo(400, 200); ctx.stroke();
        ctx.fillStyle = "#00d2ff";
        ctx.beginPath(); ctx.arc(targetX, targetY, 10, 0, Math.PI * 2); ctx.fill();
        requestAnimationFrame(draw);
    }

    // 3. THE AUDIO UPDATE (The "Tap" - changes values of existing nodes)
    function updateAudioPosition() {
    if (!audioCtx || !oscillator || !filter) return;

    // 1. PANNING (X-axis of Radar ONLY)
    const panValue = (targetX / 200) - 1;
    panner.pan.setTargetAtTime(panValue, audioCtx.currentTime, 0.05);

    // 2. PITCH (Y-axis of Radar - keep it if you like, or lock it)
    const freq = 600 - targetY; 
    oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);

    // 3. DEPTH (Controlled by the SLIDER now)
    const sliderValue = document.getElementById('depth-slider').value;
    filter.frequency.setTargetAtTime(sliderValue, audioCtx.currentTime, 0.05);
}

    // 4. THE POWER SWITCH (The "Plumbing" - creates nodes once)
    function startAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            
            filter = audioCtx.createBiquadFilter(); // Build the muffler
            filter.type = "lowpass";
            
            panner = audioCtx.createStereoPanner(); // Build the pan knob
            
            gainNode = audioCtx.createGain(); // Build the volume knob
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

            // THE CHAIN: Osc -> Filter -> Panner -> Gain -> Speakers
            oscillator.connect(filter);
            filter.connect(panner);
            panner.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
        }
        audioCtx.resume();
        document.getElementById('status-display').innerText = "Sector: 01 | Signal: ONLINE";
        updateAudioPosition();
    }

    // 5. EVENT LISTENERS (Triggers)
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        targetX = e.clientX - rect.left; targetY = e.clientY - rect.top;
        updateAudioPosition();
    });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        targetX = touch.clientX - rect.left; targetY = touch.clientY - rect.top;
        updateAudioPosition();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        targetX = touch.clientX - rect.left; targetY = touch.clientY - rect.top;
        updateAudioPosition();
    }, { passive: false });

    function resetCenter() { targetX = 200; targetY = 200; updateAudioPosition(); }
    function killAudio() { if (audioCtx) { audioCtx.suspend(); document.getElementById('status-display').innerText = "Sector: 01 | Signal: SILENCED"; } }
    function goHome() { if (audioCtx) { audioCtx.close().then(() => { window.location.href = "index.html"; }); } else { window.location.href = "index.html"; } }

    draw();

document.getElementById('depth-slider').addEventListener('input', updateAudioPosition);
    
</script>
</body>
</html>

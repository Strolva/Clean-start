<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Jigsaw Module</title>
    <style>
        /* THE STYLING */
        body { 
            background: #0f172a; color: #38bdf8; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; margin: 0; padding: 20px 10px; overflow-x: hidden;
        }

        /* NEW TOP BAR */
        #top-bar {
            width: 100%; max-width: 400px; display: flex; justify-content: space-between; 
            align-items: center; margin-bottom: 20px;
        }
        #homeBtn { background: #334155; color: #fff; padding: 10px 15px; font-size: 0.9rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;}
        
        #grid-controls { display: flex; align-items: center; gap: 10px; background: #1e293b; padding: 5px; border-radius: 8px;}
        .stepper-btn { background: #334155; color: white; border: none; border-radius: 6px; padding: 8px 12px; font-size: 1rem; cursor: pointer; touch-action: manipulation; }
        .stepper-btn:active { background: #475569; }
        #grid-size-label { font-weight: bold; width: 40px; text-align: center; color: #fff; }

        /* AUDIO CONTROLS */
        #controls { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 400px;}
        .btn { 
            padding: 12px 20px; border-radius: 8px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; justify-content: center;
        }
        
        /* Input Buttons */
        .btn-upload { background: #38bdf8; color: #0f172a; cursor: pointer; }
        .btn-record { background: #f59e0b; color: #0f172a; }
        .btn-record.recording { background: #ef4444; color: #fff; animation: pulseRecord 1s infinite; }
        
        /* Playback Buttons */
        #refBtn { background: #22c55e; color: #fff; display: none; }
        #stopBtn { background: #ef4444; color: #fff; display: none; }

        @keyframes pulseRecord {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* DYNAMIC GRID */
        #grid-container { 
            position: relative; padding: 10px; background: #1e293b; 
            border-radius: 12px; transition: all 0.5s ease;
            width: 100%; max-width: 400px; aspect-ratio: 1 / 1;
        }
        #ghost-wave { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; opacity: 0.1; pointer-events: none; 
        }
        #grid { 
            display: grid; 
            grid-template-columns: repeat(var(--cols, 3), 1fr); 
            gap: 5px; width: 100%; height: 100%; position: relative; 
        }
        .piece { 
            background: rgba(51, 65, 85, 0.8); cursor: grab; border-radius: 6px; 
            border: 2px solid transparent; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }
        .piece.correct { border-color: #38bdf8; }
        canvas { width: 100%; height: 100%; pointer-events: none; }
        #status { margin-top: 20px; font-weight: bold; height: 20px; text-align: center; font-size: 0.9rem;}

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px #38bdf8; }
            50% { transform: scale(1.03); box-shadow: 0 0 30px #38bdf8; }
            100% { transform: scale(1); box-shadow: 0 0 0px #38bdf8; }
        }
        .victory { animation: pulse 2s infinite ease-in-out; border: 2px solid #38bdf8; }
    </style>
</head>
<body>

    <div id="top-bar">
        <button id="homeBtn" onclick="window.location.href='index.html'">◀ Home</button>
        <div id="grid-controls">
            <button class="stepper-btn" onclick="changeGridSize(-1)">➖</button>
            <span id="grid-size-label">3x3</span>
            <button class="stepper-btn" onclick="changeGridSize(1)">➕</button>
        </div>
    </div>

    <div id="controls">
        <label class="btn btn-upload" id="uploadLabel">
            📂 LOAD FILE
            <input type="file" id="audioUpload" accept="audio/*" style="display: none;">
        </label>
        
        <button id="recordBtn" class="btn btn-record">🎤 RECORD</button>
        
        <button id="refBtn" class="btn" onclick="playReference()">REFERENCE</button>
        <button id="stopBtn" class="btn" onclick="stopEverything()">STOP</button>
    </div>

    <div id="grid-container">
        <canvas id="ghost-wave"></canvas>
        <div id="grid" style="--cols: 3;"></div>
    </div>

    <p id="status">Upload a track or record audio to start!</p>

    <script>
        let audioCtx, mainBuffer;
        let activeSources = []; 
        
        // Recording Variables
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        
        // Dynamic Grid Logic
        let gridSize = 3; 
        let totalPieces = gridSize * gridSize;
        let pieces = [];

        function scramblePieces() {
            pieces = Array.from({length: totalPieces}, (_, i) => i).sort(() => Math.random() - 0.5);
        }
        scramblePieces(); 

        function changeGridSize(dir) {
            let newSize = gridSize + dir;
            if (newSize >= 3 && newSize <= 5) {
                gridSize = newSize;
                totalPieces = gridSize * gridSize;
                
                document.getElementById('grid-size-label').innerText = `${gridSize}x${gridSize}`;
                document.getElementById('grid').style.setProperty('--cols', gridSize);
                
                scramblePieces();
                stopEverything();
                document.getElementById('grid-container').classList.remove('victory');
                
                if (mainBuffer) {
                    document.getElementById('status').innerText = `${totalPieces} Bars Loaded. Solve it!`;
                    drawGhostWave();
                }
                render();
            }
        }

        // Helper to ensure AudioContext exists and is running
        function initAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Core function to process raw audio data into our puzzle buffer
        async function processAudioData(arrayBuffer) {
            const status = document.getElementById('status');
            status.innerText = "Decoding Audio...";
            try {
                mainBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                // Show playback controls (Input controls now persist!)
                document.getElementById('refBtn').style.display = 'inline-block';
                document.getElementById('stopBtn').style.display = 'inline-block';
                
                status.innerText = `${totalPieces} Bars Loaded. Solve it!`;
                
                // Reset the puzzle when new audio is loaded
                scramblePieces();
                document.getElementById('grid-container').classList.remove('victory');
                
                drawGhostWave();
                render();
            } catch (e) {
                status.innerText = "❌ Error reading audio file!";
                console.error(e);
            }
        }

        // --- FILE UPLOAD LOGIC ---
        document.getElementById('audioUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            initAudioCtx();
            const reader = new FileReader();
            reader.onload = async function(ev) {
                await processAudioData(ev.target.result);
            };
            reader.readAsArrayBuffer(file);
        });

        // --- MICROPHONE RECORDING LOGIC ---
        document.getElementById('recordBtn').addEventListener('click', async () => {
            const recordBtn = document.getElementById('recordBtn');
            const status = document.getElementById('status');

            if (!isRecording) {
                // START RECORDING
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = e => {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = async () => {
                        initAudioCtx();
                        const audioBlob = new Blob(audioChunks);
                        const arrayBuffer = await audioBlob.arrayBuffer();
                        await processAudioData(arrayBuffer);
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.innerText = "🛑 STOP RECORDING";
                    recordBtn.classList.add('recording');
                    status.innerText = "🔴 Recording... Speak now!";
                } catch (err) {
                    status.innerText = "❌ Mic access denied or failed.";
                    console.error("Mic error:", err);
                }
            } else {
                // STOP RECORDING
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.innerText = "🎤 RECORD";
                recordBtn.classList.remove('recording');
                // The mediaRecorder.onstop event will handle processing
            }
        });

        function stopEverything() {
            activeSources.forEach(s => { try { s.stop(); } catch(e) {} });
            activeSources = [];
        }

        function playSlice(idx) {
            if (!mainBuffer) return;
            stopEverything(); 
            const source = audioCtx.createBufferSource();
            const gainNode = audioCtx.createGain();
            source.buffer = mainBuffer;
            
            const sliceWidth = mainBuffer.duration / totalPieces;
            const startOffset = idx * sliceWidth;
            const playDuration = sliceWidth * 0.98;

            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime + playDuration - 0.05);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + playDuration);
            
            source.start(0, startOffset, playDuration);
            activeSources.push(source);
        }

        function playReference() {
            if (!mainBuffer) return;
            stopEverything();
            const source = audioCtx.createBufferSource();
            source.buffer = mainBuffer;
            source.connect(audioCtx.destination);
            source.start(0);
            activeSources.push(source);
            document.getElementById('status').innerText = "Playing Reference...";
        }

        function drawGhostWave() {
            const canvas = document.getElementById('ghost-wave');
            canvas.width = 400; canvas.height = 400;
            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, 200);
            for(let x=0; x<400; x++) {
                ctx.lineTo(x, 200 + Math.sin(x*0.05)*40 + Math.cos(x*0.02)*20);
            }
            ctx.stroke();
        }

        function render() {
            const grid = document.getElementById('grid');
            const container = document.getElementById('grid-container');
            grid.innerHTML = '';
            const isSolved = pieces.every((p, i) => p === i);

            pieces.forEach((pIdx, i) => {
                const div = document.createElement('div');
                div.className = `piece ${pIdx === i ? 'correct' : ''}`;
                div.draggable = true;
                
                const cvs = document.createElement('canvas');
                cvs.width = 100; cvs.height = 100;
                div.appendChild(cvs);
                const ctx = cvs.getContext('2d');
                ctx.strokeStyle = pIdx === i ? '#38bdf8' : '#64748b';
                ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 50);
                for(let x=0; x<100; x++) {
                    const gx = x + (pIdx * 100);
                    ctx.lineTo(x, 50 + Math.sin(gx*0.05)*30 + Math.cos(gx*0.02)*15);
                }
                ctx.stroke();

                div.onclick = () => playSlice(pIdx);
                div.ondragstart = (e) => e.dataTransfer.setData('text', i);
                div.ondragover = (e) => e.preventDefault();
                div.ondrop = (e) => {
                    const from = e.dataTransfer.getData('text');
                    [pieces[from], pieces[i]] = [pieces[i], pieces[from]];
                    playSlice(pIdx);
                    render();
                };
                grid.appendChild(div);
            });

            if (isSolved && mainBuffer) { 
                document.getElementById('status').innerText = "🎉 HARMONY RESTORED!";
                container.classList.add('victory');
                playReference();
            }
        }
        
        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puzzle Box | Master Shell</title>
    <style>
        :root { 
            --bg: #22262b; --panel: #2b3036; --accent: #00ff88; 
            --text: #a0a5ab; --border: #181b1f; 
        }
        
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }

        /* BUTTON STYLES */
        .btn { background: #333; color: white; border: 1px solid #444; padding: 12px 20px; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; touch-action: manipulation; }
        .btn:active { background: #555; }
        .btn-accent { background: var(--accent); color: #000; border: none; padding: 15px 30px; font-size: 1.2rem; margin-top: 20px;}
        .btn-accent:active { background: #00cc6a; }

        /* SCREEN CONTAINERS */
        #hub-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        #puzzle-screen { display: none; /* Hidden by default */ }

        /* HEADER */
        .puzzle-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border); }
        .puzzle-title { font-size: 1.2rem; font-weight: bold; color: #ddd; }

        /* CONTROLS (- / +) */
        .part-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; background: var(--panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .stepper-btn { background: #444; color: white; border: none; border-radius: 6px; width: 44px; height: 44px; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; touch-action: manipulation;}
        .stepper-btn:active { background: #666; }
        #part-count { font-size: 1.3rem; font-weight: bold; color: #ddd; min-width: 90px; }

        /* DUMMY PUZZLE GRID */
        #puzzle-board { background: #1a1d20; border: 2px solid var(--border); border-radius: 8px; padding: 10px; display: grid; gap: 5px; min-height: 300px; justify-content: center; align-content: center;}
        .puzzle-piece { background: #3a4149; border: 1px dashed #555; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #777; font-weight: bold; font-size: 0.8rem; aspect-ratio: 1 / 1; }
    </style>
</head>
<body>

    <div id="hub-screen">
        <h1 style="color: #ddd;">Main Hub</h1>
        <p>Welcome to the puzzle suite.</p>
        <button class="btn btn-accent" id="start-puzzle-btn">Start Puzzle Box</button>
    </div>

    <div id="puzzle-screen">
        
        <div class="puzzle-header">
            <button class="btn" id="return-hub-btn">◀ Hub</button>
            <div class="puzzle-title">Puzzle Box</div>
            <div style="width: 80px;"></div> </div>

        <div class="part-controls">
            <button class="stepper-btn" id="btn-minus">➖</button>
            <span id="part-count">4 Parts</span>
            <button class="stepper-btn" id="btn-plus">➕</button>
        </div>

        <div id="puzzle-board">
            </div>

    </div>

<script>
    // --- 1. SCREEN NAVIGATION LOGIC ---
    const hubScreen = document.getElementById('hub-screen');
    const puzzleScreen = document.getElementById('puzzle-screen');

    document.getElementById('start-puzzle-btn').addEventListener('click', () => {
        hubScreen.style.display = 'none';
        puzzleScreen.style.display = 'block';
        updatePuzzleGrid(); // Draw the grid when we enter the room
    });

    document.getElementById('return-hub-btn').addEventListener('click', () => {
        puzzleScreen.style.display = 'none';
        hubScreen.style.display = 'flex';
    });


    // --- 2. PUZZLE PART COUNTER LOGIC ---
    let currentParts = 4;   // Default starting parts
    const minParts = 2;     // Absolute minimum
    const maxParts = 25;    // Absolute maximum

    const countDisplay = document.getElementById('part-count');

    document.getElementById('btn-minus').addEventListener('click', () => {
        if (currentParts > minParts) {
            currentParts--;
            updatePuzzleGrid();
        }
    });

    document.getElementById('btn-plus').addEventListener('click', () => {
        if (currentParts < maxParts) {
            currentParts++;
            updatePuzzleGrid();
        }
    });


    // --- 3. GRID GENERATION (GRAFT YOUR CODE HERE TOMORROW) ---
    const puzzleBoard = document.getElementById('puzzle-board');

    function updatePuzzleGrid() {
        // Update the text counter
        countDisplay.innerText = `${currentParts} Parts`;

        // Clear the old grid
        puzzleBoard.innerHTML = '';

        // Calculate a nice grid layout based on number of parts (e.g. 2x2, 3x3)
        let columns = Math.ceil(Math.sqrt(currentParts));
        puzzleBoard.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;

        // 🛑 --> THIS IS WHERE YOU ADD YOUR ACTUAL PUZZLE LOGIC LATER <-- 🛑
        // For now, it just creates visual dummy blocks to prove the buttons work
        for (let i = 1; i <= currentParts; i++) {
            const piece = document.createElement('div');
            piece.className = 'puzzle-piece';
            piece.innerText = `P${i}`;
            puzzleBoard.appendChild(piece);
        }
    }
</script>
</body>
</html>
